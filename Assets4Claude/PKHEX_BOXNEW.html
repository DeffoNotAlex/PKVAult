<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKHeX — Box Viewer Dual-Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #070C1A;
    --bg-mid: #0C1228;
    --bg-card: #131B35;
    --bg-card-hover: #182242;
    --bg-card-active: #1C2850;
    --bg-slot: #0E1529;
    --bg-slot-filled: #111C33;

    --accent-blue: #3B8BFF;
    --accent-blue-soft: #6BABFF;
    --accent-teal: #36D1C4;
    --accent-green: #34D990;
    --accent-pink: #FF6B9D;
    --accent-orange: #FF9F43;
    --accent-purple: #A78BFA;
    --accent-red: #FF5252;
    --accent-yellow: #FFD93D;

    --text-primary: #EDF0FF;
    --text-secondary: #8892B5;
    --text-dim: #3D4A6E;
    --text-muted: #283456;

    --border-subtle: rgba(255,255,255,0.05);

    --cursor-blue-bg: rgba(59,139,255,0.12);
    --cursor-blue-stroke: #5CA0FF;
    --cursor-gold-bg: rgba(200,170,80,0.15);
    --cursor-gold-stroke: #C8AA50;
    --cursor-green-stroke: #3CDC6E;

    --type-normal: #A8A878;
    --type-fire: #F08030;
    --type-water: #6890F0;
    --type-grass: #78C850;
    --type-electric: #F8D030;
    --type-ice: #98D8D8;
    --type-fighting: #C03028;
    --type-poison: #A040A0;
    --type-ground: #E0C068;
    --type-flying: #A890F0;
    --type-psychic: #F85888;
    --type-bug: #A8B820;
    --type-rock: #B8A038;
    --type-ghost: #705898;
    --type-dark: #705848;
    --type-dragon: #7038F8;
    --type-steel: #B8B8D0;
    --type-fairy: #EE99AC;

    --screen-w: 560px;
    --top-h: 315px;  /* 560 / (1920/1080) */
    --bottom-h: 643px; /* 560 * (1240/1080) */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #020408;
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px 16px 72px;
    overflow-x: hidden;
  }

  /* Device frame */
  .device-frame {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen-label {
    font-family: 'Quicksand', sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 5px;
    align-self: flex-start;
    padding-left: 6px;
  }

  .top-bezel {
    width: calc(var(--screen-w) + 24px);
    background: #0E0E16;
    border-radius: 16px 16px 3px 3px;
    padding: 12px;
    box-shadow: 0 2px 30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .top-screen {
    width: var(--screen-w);
    height: var(--top-h);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: var(--bg-deep);
  }

  .hinge {
    width: calc(var(--screen-w) + 32px);
    height: 16px;
    background: linear-gradient(to bottom, #08080F 0%, #18182A 35%, #1E1E30 50%, #18182A 65%, #0A0A12 100%);
    z-index: 2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hinge::after { content: ''; width: 50px; height: 2.5px; border-radius: 2px; background: rgba(255,255,255,0.04); }

  .bottom-bezel {
    width: calc(var(--screen-w) + 24px);
    background: #0E0E16;
    border-radius: 3px 3px 20px 20px;
    padding: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .bottom-screen {
    width: var(--screen-w);
    height: var(--bottom-h);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
  }

  /* ======================================
     TOP SCREEN — Pokémon Detail / Trainer Card
     ====================================== */

  /* --- Idle: Trainer card --- */
  .trainer-card {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    padding: 0 40px;
    transition: opacity 0.4s ease, transform 0.3s ease;
    z-index: 2;
  }
  .trainer-card.hidden {
    opacity: 0;
    transform: scale(0.97);
    pointer-events: none;
  }

  .trainer-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(232,93,117,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(167,139,250,0.06) 0%, transparent 45%),
      linear-gradient(135deg, #070C1A 0%, #0D1530 100%);
  }

  .trainer-artwork {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(232,93,117,0.15), rgba(167,139,250,0.1));
    border: 2px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .trainer-artwork-inner {
    font-size: 48px;
    opacity: 0.6;
  }

  .trainer-info {
    margin-left: 32px;
    position: relative;
    z-index: 1;
  }
  .trainer-name-big {
    font-size: 28px;
    font-weight: 900;
    line-height: 1.1;
  }
  .trainer-game-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .trainer-stats-row {
    display: flex;
    gap: 24px;
    margin-top: 14px;
  }
  .trainer-stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .trainer-stat-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .trainer-stat-val {
    font-size: 16px;
    font-weight: 800;
  }

  .trainer-divider {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.06), transparent);
    margin-left: auto;
    margin-right: 40px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .trainer-box-info {
    position: relative;
    z-index: 1;
    text-align: right;
  }
  .trainer-box-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .trainer-box-name {
    font-size: 20px;
    font-weight: 800;
    margin-top: 2px;
  }
  .trainer-box-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* --- Selected: Three-column Pokémon detail --- */
  .pokemon-detail {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: stretch;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.35s ease;
    z-index: 3;
    pointer-events: none;
  }
  .pokemon-detail.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .detail-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 50%, rgba(59,139,255,0.06) 0%, transparent 40%),
      linear-gradient(170deg, #070C1A, #0B1225);
  }

  /* Column 1: Sprite */
  .col-sprite {
    flex: 0 0 30%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .sprite-container {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sprite-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.15;
    transition: background 0.5s ease;
  }

  .sprite-img {
    width: 120px;
    height: 120px;
    image-rendering: pixelated;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }

  .sprite-name-row {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 2;
    white-space: nowrap;
  }
  .sprite-species {
    font-size: 16px;
    font-weight: 800;
  }
  .sprite-sub {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* Type badge */
  .type-badges {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 2;
  }
  .type-badge {
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* Column 2: Stat radar */
  .col-radar {
    flex: 0 0 35%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .radar-container {
    width: 220px;
    height: 220px;
    position: relative;
  }

  .radar-canvas {
    width: 100%;
    height: 100%;
  }

  /* Column 3: Moves */
  .col-moves {
    flex: 0 0 35%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 28px 20px 12px;
    position: relative;
    z-index: 1;
  }

  .moves-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
  }

  .move-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin-bottom: 5px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.03);
    transition: all 0.2s;
  }

  .move-type-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .move-info {
    flex: 1;
    min-width: 0;
  }
  .move-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
  }
  .move-detail {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .move-pp {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  /* Ability + item row */
  .extra-info {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .extra-item {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .extra-label {
    font-size: 8px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .extra-val {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-primary);
  }


  /* ======================================
     BOTTOM SCREEN — Box Grid
     ====================================== */
  .bottom-content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(59,139,255,0.02) 0%, transparent 35%),
      var(--bg-deep);
  }

  /* Box header */
  .box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    flex-shrink: 0;
  }

  .box-nav-btn {
    width: 40px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-secondary);
  }
  .box-nav-btn:hover {
    background: var(--bg-card-hover);
    border-color: rgba(255,255,255,0.08);
  }
  .box-nav-btn svg { width: 16px; height: 16px; }

  .box-title-area {
    text-align: center;
  }
  .box-name {
    font-family: 'Quicksand', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
  }
  .box-bumper-hint {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* Grid area */
  .grid-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 14px;
  }

  .box-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 520px;
    aspect-ratio: 6 / 5;
  }

  .slot {
    position: relative;
    border-radius: 10px;
    background: var(--bg-slot);
    border: 1.5px solid rgba(255,255,255,0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    overflow: visible;
    aspect-ratio: 1;
  }

  .slot.filled {
    background: var(--bg-slot-filled);
  }

  /* Cursor — the star of the show */
  .slot.cursor {
    border-color: var(--cursor-blue-stroke);
    background: var(--cursor-blue-bg);
    z-index: 10;
  }

  /* Outer glow ring */
  .slot.cursor::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 13px;
    border: 2px solid rgba(92,160,255,0.35);
    animation: cursorPulse 1.8s ease-in-out infinite;
    pointer-events: none;
  }

  /* Inner glow */
  .slot.cursor::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 11px;
    box-shadow: 
      0 0 12px rgba(59,139,255,0.3),
      0 0 24px rgba(59,139,255,0.12),
      inset 0 0 8px rgba(59,139,255,0.08);
    animation: cursorGlow 1.8s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes cursorPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
  }

  @keyframes cursorGlow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Selected (gold) */
  .slot.selected {
    border-color: var(--cursor-gold-stroke);
    background: var(--cursor-gold-bg);
    z-index: 9;
  }
  .slot.selected::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 13px;
    border: 2px solid rgba(200,170,80,0.3);
    pointer-events: none;
  }
  .slot.selected::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 11px;
    box-shadow: 0 0 14px rgba(200,170,80,0.2), 0 0 28px rgba(200,170,80,0.08);
    pointer-events: none;
  }

  /* Move mode (green) */
  .slot.move-cursor {
    border-color: var(--cursor-green-stroke);
    background: rgba(60,220,110,0.1);
    z-index: 10;
  }
  .slot.move-cursor::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 13px;
    border: 2px solid rgba(60,220,110,0.35);
    animation: cursorPulse 1.4s ease-in-out infinite;
    pointer-events: none;
  }
  .slot.move-cursor::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 11px;
    box-shadow: 0 0 14px rgba(60,220,110,0.25), 0 0 28px rgba(60,220,110,0.1);
    animation: cursorGlow 1.4s ease-in-out infinite;
    pointer-events: none;
  }

  /* Sprite inside slot */
  .slot-sprite {
    width: 70%;
    height: 70%;
    image-rendering: pixelated;
    position: relative;
    z-index: 1;
    transition: transform 0.15s ease;
  }
  .slot.cursor .slot-sprite {
    transform: scale(1.08);
  }

  /* Ghost sprite (move source) */
  .slot.move-source .slot-sprite {
    opacity: 0.3;
  }

  /* Legality dot */
  .legality-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    z-index: 2;
  }
  .legality-dot.legal { background: var(--accent-green); box-shadow: 0 0 4px rgba(52,217,144,0.5); }
  .legality-dot.illegal { background: var(--accent-red); box-shadow: 0 0 4px rgba(255,82,82,0.5); }

  /* Info bar */
  .info-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
    flex-shrink: 0;
  }

  .slot-info {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .slot-info .species-num {
    color: var(--text-dim);
    font-weight: 600;
  }

  .gp-hints {
    display: flex;
    gap: 12px;
  }
  .gp-hint {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .gp-glyph {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 800;
    color: var(--text-secondary);
  }

  /* ======================================
     CONTROL BAR
     ====================================== */
  .control-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #06060E;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 100;
    flex-wrap: wrap;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .ctrl-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-right: 2px;
  }
  .ctrl-btn {
    padding: 5px 12px;
    border-radius: 7px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn:hover {
    background: var(--accent-blue);
    color: #fff;
    border-color: var(--accent-blue);
  }
  .ctrl-btn.active {
    background: var(--accent-green);
    color: #fff;
    border-color: var(--accent-green);
  }
  .ctrl-sep {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.06);
    margin: 0 6px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    :root {
      --screen-w: 95vw;
      --top-h: calc(var(--screen-w) * 0.5625);
      --bottom-h: calc(var(--screen-w) * 1.148);
    }
    .top-bezel, .bottom-bezel { width: calc(var(--screen-w) + 16px); }
    .hinge { width: calc(var(--screen-w) + 22px); }
    .trainer-artwork { width: 100px; height: 100px; }
    .trainer-artwork-inner { font-size: 36px; }
    .trainer-name-big { font-size: 22px; }
    .trainer-info { margin-left: 20px; }
    .sprite-container { width: 100px; height: 100px; }
    .sprite-img { width: 80px; height: 80px; }
    .radar-container { width: 160px; height: 160px; }
    .col-moves { padding: 12px 16px 12px 8px; }
    .move-row { padding: 5px 8px; }
    .move-name { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="device-frame">
  <!-- TOP SCREEN -->
  <div class="screen-label">Top · 6" AMOLED · 1920×1080 @ 120Hz</div>
  <div class="top-bezel">
    <div class="top-screen" id="topScreen">
      <!-- Idle: Trainer card -->
      <div class="trainer-card" id="trainerCard">
        <div class="trainer-bg"></div>
        <div class="trainer-artwork">
          <div class="trainer-artwork-inner">🎮</div>
        </div>
        <div class="trainer-info">
          <div class="trainer-name-big">Player</div>
          <div class="trainer-game-label">Pokémon Y · Gen 6</div>
          <div class="trainer-stats-row">
            <div class="trainer-stat">
              <div class="trainer-stat-label">TID</div>
              <div class="trainer-stat-val">45504</div>
            </div>
            <div class="trainer-stat">
              <div class="trainer-stat-label">Pokédex</div>
              <div class="trainer-stat-val">457</div>
            </div>
            <div class="trainer-stat">
              <div class="trainer-stat-label">Playtime</div>
              <div class="trainer-stat-val">183:02</div>
            </div>
          </div>
        </div>
        <div class="trainer-divider"></div>
        <div class="trainer-box-info">
          <div class="trainer-box-label">Current Box</div>
          <div class="trainer-box-name" id="trainerBoxName">BOX 2</div>
          <div class="trainer-box-count">12 / 30 filled</div>
        </div>
      </div>

      <!-- Selected: Pokémon detail -->
      <div class="pokemon-detail" id="pokemonDetail">
        <div class="detail-bg"></div>

        <!-- Sprite column -->
        <div class="col-sprite">
          <div class="type-badges" id="typeBadges"></div>
          <div class="sprite-container">
            <div class="sprite-glow" id="spriteGlow"></div>
            <div class="sprite-img" id="spriteImg" style="font-size:80px;text-align:center;line-height:120px;"></div>
          </div>
          <div class="sprite-name-row">
            <div class="sprite-species" id="speciesName">Electrode</div>
            <div class="sprite-sub" id="speciesSub">Lv.38 · Calm</div>
          </div>
        </div>

        <!-- Radar column -->
        <div class="col-radar">
          <div class="radar-container">
            <canvas class="radar-canvas" id="radarCanvas" width="440" height="440"></canvas>
          </div>
        </div>

        <!-- Moves column -->
        <div class="col-moves" id="movesCol"></div>
      </div>
    </div>
  </div>

  <div class="hinge"></div>

  <!-- BOTTOM SCREEN -->
  <div class="screen-label" style="margin-top:4px;">Bottom · 3.92" AMOLED · 1080×1240 · Touch</div>
  <div class="bottom-bezel">
    <div class="bottom-screen">
      <div class="bottom-content">
        <!-- Box header -->
        <div class="box-header">
          <div class="box-nav-btn" onclick="changeBox(-1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </div>
          <div class="box-title-area">
            <div class="box-name" id="boxName">BOX 2</div>
            <div class="box-bumper-hint">L / R</div>
          </div>
          <div class="box-nav-btn" onclick="changeBox(1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>

        <!-- Grid -->
        <div class="grid-wrapper">
          <div class="box-grid" id="boxGrid"></div>
        </div>

        <!-- Info bar -->
        <div class="info-bar">
          <div class="slot-info" id="slotInfo">
            <span class="species-num">#101</span> Electrode · Lv.38
          </div>
          <div class="gp-hints">
            <div class="gp-hint"><span class="gp-glyph" style="color:var(--accent-green)">A</span>Select</div>
            <div class="gp-hint"><span class="gp-glyph" style="color:var(--accent-yellow)">Y</span>Grab</div>
            <div class="gp-hint"><span class="gp-glyph" style="color:var(--accent-pink)">B</span>Back</div>
            <div class="gp-hint"><span class="gp-glyph">St</span>Menu</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Control bar -->
<div class="control-bar">
  <div class="ctrl-group">
    <span class="ctrl-label">D-Pad:</span>
    <button class="ctrl-btn" onclick="moveDir(0,-1)">▲</button>
    <button class="ctrl-btn" onclick="moveDir(0,1)">▼</button>
    <button class="ctrl-btn" onclick="moveDir(-1,0)">◀</button>
    <button class="ctrl-btn" onclick="moveDir(1,0)">▶</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <button class="ctrl-btn" onclick="pressA()">Ⓐ Select</button>
    <button class="ctrl-btn" id="moveBtn" onclick="pressY()">Ⓨ Grab</button>
    <button class="ctrl-btn" onclick="pressB()">Ⓑ Back</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Box:</span>
    <button class="ctrl-btn" onclick="changeBox(-1)">L</button>
    <button class="ctrl-btn" onclick="changeBox(1)">R</button>
  </div>
</div>

<script>
// ====== Pokémon data ======
const pokemon = [
  { name:'Azumarill', types:['water','fairy'], lv:32, nature:'Adamant', hp:170, atk:112, def:100, spa:60, spd:100, spe:70, ability:'Huge Power', item:'Sitrus Berry',
    moves:[{name:'Aqua Tail',type:'water',cat:'Phys',pp:'10/10'},{name:'Play Rough',type:'fairy',cat:'Phys',pp:'10/10'},{name:'Superpower',type:'fighting',cat:'Phys',pp:'5/5'},{name:'Aqua Jet',type:'water',cat:'Phys',pp:'20/20'}]},
  { name:'Meowstic', types:['psychic'], lv:35, nature:'Timid', hp:140, atk:55, def:80, spa:115, spd:95, spe:110, ability:'Prankster', item:'Light Clay',
    moves:[{name:'Psychic',type:'psychic',cat:'Spec',pp:'10/10'},{name:'Light Screen',type:'psychic',cat:'Stat',pp:'30/30'},{name:'Reflect',type:'psychic',cat:'Stat',pp:'20/20'},{name:'Thunder Wave',type:'electric',cat:'Stat',pp:'20/20'}]},
  { name:'Emolga', types:['electric','flying'], lv:30, nature:'Jolly', hp:120, atk:95, def:65, spa:80, spd:70, spe:125, ability:'Motor Drive', item:'',
    moves:[{name:'Acrobatics',type:'flying',cat:'Phys',pp:'15/15'},{name:'Wild Charge',type:'electric',cat:'Phys',pp:'15/15'},{name:'U-turn',type:'bug',cat:'Phys',pp:'20/20'},{name:'Nuzzle',type:'electric',cat:'Phys',pp:'20/20'}]},
  null,
  { name:'Electrode', types:['electric'], lv:38, nature:'Calm', hp:105, atk:47, def:63, spa:122, spd:70, spe:82, ability:'Soundproof', item:'Magnet',
    moves:[{name:'Thunderbolt',type:'electric',cat:'Spec',pp:'15/15'},{name:'Volt Switch',type:'electric',cat:'Spec',pp:'20/20'},{name:'Signal Beam',type:'bug',cat:'Spec',pp:'15/15'},{name:'Light Screen',type:'electric',cat:'Stat',pp:'30/30'}]},
  { name:'Alakazam', types:['psychic'], lv:40, nature:'Modest', hp:120, atk:45, def:55, spa:175, spd:105, spe:145, ability:'Magic Guard', item:'Life Orb',
    moves:[{name:'Psychic',type:'psychic',cat:'Spec',pp:'10/10'},{name:'Shadow Ball',type:'ghost',cat:'Spec',pp:'15/15'},{name:'Focus Blast',type:'fighting',cat:'Spec',pp:'5/5'},{name:'Energy Ball',type:'grass',cat:'Spec',pp:'10/10'}]},
  null, null,
  { name:'Talonflame', types:['fire','flying'], lv:36, nature:'Adamant', hp:150, atk:120, def:80, spa:65, spd:75, spe:130, ability:'Gale Wings', item:'Sharp Beak',
    moves:[{name:'Brave Bird',type:'flying',cat:'Phys',pp:'15/15'},{name:'Flare Blitz',type:'fire',cat:'Phys',pp:'15/15'},{name:'Swords Dance',type:'normal',cat:'Stat',pp:'20/20'},{name:'Roost',type:'flying',cat:'Stat',pp:'10/10'}]},
  { name:'Goodra', types:['dragon'], lv:50, nature:'Modest', hp:200, atk:90, def:90, spa:160, spd:170, spe:90, ability:'Sap Sipper', item:'Assault Vest',
    moves:[{name:'Dragon Pulse',type:'dragon',cat:'Spec',pp:'10/10'},{name:'Sludge Bomb',type:'poison',cat:'Spec',pp:'10/10'},{name:'Thunderbolt',type:'electric',cat:'Spec',pp:'15/15'},{name:'Flamethrower',type:'fire',cat:'Spec',pp:'15/15'}]},
  { name:'Hawlucha', types:['fighting','flying'], lv:34, nature:'Jolly', hp:135, atk:130, def:80, spa:55, spd:65, spe:125, ability:'Unburden', item:'',
    moves:[{name:'High Jump Kick',type:'fighting',cat:'Phys',pp:'10/10'},{name:'Acrobatics',type:'flying',cat:'Phys',pp:'15/15'},{name:'Swords Dance',type:'normal',cat:'Stat',pp:'20/20'},{name:'Roost',type:'flying',cat:'Stat',pp:'10/10'}]},
  { name:'Gardevoir', types:['psychic','fairy'], lv:42, nature:'Timid', hp:145, atk:55, def:70, spa:165, spd:140, spe:105, ability:'Trace', item:'Gardevoirite',
    moves:[{name:'Moonblast',type:'fairy',cat:'Spec',pp:'15/15'},{name:'Psyshock',type:'psychic',cat:'Spec',pp:'10/10'},{name:'Calm Mind',type:'psychic',cat:'Stat',pp:'20/20'},{name:'Will-O-Wisp',type:'fire',cat:'Stat',pp:'15/15'}]},
  null,null,null,
  { name:'Tyrantrum', types:['rock','dragon'], lv:44, nature:'Jolly', hp:170, atk:155, def:130, spa:60, spd:65, spe:95, ability:'Strong Jaw', item:'',
    moves:[{name:'Head Smash',type:'rock',cat:'Phys',pp:'5/5'},{name:'Dragon Claw',type:'dragon',cat:'Phys',pp:'15/15'},{name:'Crunch',type:'dark',cat:'Phys',pp:'15/15'},{name:'Earthquake',type:'ground',cat:'Phys',pp:'10/10'}]},
  null,null,
  { name:'Aurorus', types:['rock','ice'], lv:39, nature:'Modest', hp:185, atk:60, def:80, spa:140, spd:100, spe:58, ability:'Refrigerate', item:'',
    moves:[{name:'Hyper Voice',type:'normal',cat:'Spec',pp:'10/10'},{name:'Freeze-Dry',type:'ice',cat:'Spec',pp:'20/20'},{name:'Ancient Power',type:'rock',cat:'Spec',pp:'5/5'},{name:'Thunderbolt',type:'electric',cat:'Spec',pp:'15/15'}]},
  null,null,null,null,null,null,null,null,null,null
];

// Fill to 30
while (pokemon.length < 30) pokemon.push(null);

const typeColors = {
  normal:'#A8A878', fire:'#F08030', water:'#6890F0', grass:'#78C850', electric:'#F8D030',
  ice:'#98D8D8', fighting:'#C03028', poison:'#A040A0', ground:'#E0C068', flying:'#A890F0',
  psychic:'#F85888', bug:'#A8B820', rock:'#B8A038', ghost:'#705898', dark:'#705848',
  dragon:'#7038F8', steel:'#B8B8D0', fairy:'#EE99AC'
};

const emojiMap = {
  Azumarill:'🐰', Meowstic:'🐱', Emolga:'🐿️', Electrode:'⚡', Alakazam:'🔮',
  Talonflame:'🔥', Goodra:'🐉', Hawlucha:'🦅', Gardevoir:'✨', Tyrantrum:'🦖', Aurorus:'❄️'
};

// State
let cursorX = 0, cursorY = 0;
let selectedSlot = -1;
let moveMode = false;
let moveSourceSlot = -1;
let currentBox = 2;

const grid = document.getElementById('boxGrid');
const slots = [];

// Build grid
for (let i = 0; i < 30; i++) {
  const slot = document.createElement('div');
  const p = pokemon[i];
  slot.className = `slot${p ? ' filled' : ''}`;
  if (p) {
    slot.innerHTML = `
      <div class="slot-sprite" style="font-size:36px;display:flex;align-items:center;justify-content:center;">${emojiMap[p.name]||'?'}</div>
      <div class="legality-dot ${Math.random()>0.15?'legal':'illegal'}"></div>
    `;
  }
  slot.addEventListener('click', () => {
    cursorX = i % 6;
    cursorY = Math.floor(i / 6);
    updateGrid();
  });
  grid.appendChild(slot);
  slots.push(slot);
}

function getCursorIndex() { return cursorY * 6 + cursorX; }

function updateGrid() {
  const ci = getCursorIndex();
  const p = pokemon[ci];

  slots.forEach((s, i) => {
    s.classList.remove('cursor', 'selected', 'move-cursor', 'move-source');
    if (moveMode && i === moveSourceSlot) s.classList.add('move-source');
    if (moveMode && i === ci) {
      s.classList.add('move-cursor');
    } else if (i === ci) {
      s.classList.add('cursor');
    }
    if (i === selectedSlot && !moveMode) s.classList.add('selected');
  });

  // Update info bar
  const info = document.getElementById('slotInfo');
  if (p) {
    info.innerHTML = `<span class="species-num">#${String(pokemon.indexOf(p)+1).padStart(3,'0')}</span> ${p.name} · Lv.${p.lv}`;
  } else {
    info.textContent = 'Empty slot';
  }

  // Update top screen
  const tc = document.getElementById('trainerCard');
  const pd = document.getElementById('pokemonDetail');

  if (p && selectedSlot === ci) {
    tc.classList.add('hidden');
    pd.classList.add('visible');
    showPokemonDetail(p);
  } else {
    pd.classList.remove('visible');
    tc.classList.remove('hidden');
  }
}

function showPokemonDetail(p) {
  // Type badges
  const tb = document.getElementById('typeBadges');
  tb.innerHTML = p.types.map(t => `<div class="type-badge" style="background:${typeColors[t]}">${t}</div>`).join('');

  // Sprite
  document.getElementById('spriteImg').textContent = emojiMap[p.name] || '?';
  document.getElementById('spriteGlow').style.background = typeColors[p.types[0]];
  document.getElementById('speciesName').textContent = p.name;
  document.getElementById('speciesSub').textContent = `Lv.${p.lv} · ${p.nature}`;

  // Radar
  drawRadar(p);

  // Moves
  const mc = document.getElementById('movesCol');
  mc.innerHTML = `
    <div class="moves-label">Moves</div>
    ${p.moves.map(m => `
      <div class="move-row">
        <div class="move-type-dot" style="background:${typeColors[m.type]}"></div>
        <div class="move-info">
          <div class="move-name">${m.name}</div>
          <div class="move-detail">${m.cat}</div>
        </div>
        <div class="move-pp">${m.pp}</div>
      </div>
    `).join('')}
    <div class="extra-info">
      <div class="extra-item">
        <div class="extra-label">Ability</div>
        <div class="extra-val">${p.ability}</div>
      </div>
      ${p.item ? `<div class="extra-item"><div class="extra-label">Item</div><div class="extra-val">${p.item}</div></div>` : ''}
    </div>
  `;
}

// Stat radar
function drawRadar(p) {
  const canvas = document.getElementById('radarCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2;
  const maxStat = 200;
  const labels = ['HP','Atk','Def','SpA','SpD','Spe'];
  const vals = [p.hp, p.atk, p.def, p.spa, p.spd, p.spe];
  const colors = ['#3CDC6E','#FF5252','#FFD93D','#6BABFF','#A78BFA','#FF6B9D'];

  ctx.clearRect(0,0,w,h);

  // Draw rings
  for (let ring = 1; ring <= 4; ring++) {
    const r = (ring/4) * 160;
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const angle = (Math.PI*2/6)*i - Math.PI/2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(255,255,255,${ring===4?0.08:0.04})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axis lines
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI*2/6)*i - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 160*Math.cos(angle), cy + 160*Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Stat polygon
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI*2/6)*i - Math.PI/2;
    const r = (Math.min(vals[i], maxStat)/maxStat) * 155;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();

  // Fill with gradient
  const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,160);
  grad.addColorStop(0, 'rgba(59,139,255,0.25)');
  grad.addColorStop(1, 'rgba(167,139,250,0.08)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(107,171,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Stat dots and labels
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI*2/6)*i - Math.PI/2;
    const r = (Math.min(vals[i], maxStat)/maxStat) * 155;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle = colors[i];
    ctx.fill();

    // Label
    const lr = 180;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    ctx.font = 'bold 20px Nunito';
    ctx.fillStyle = colors[i];
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], lx, ly - 12);

    ctx.font = 'bold 24px Nunito';
    ctx.fillStyle = '#EDF0FF';
    ctx.fillText(String(vals[i]), lx, ly + 12);
  }
}

// Navigation
function moveDir(dx, dy) {
  cursorX = Math.max(0, Math.min(5, cursorX + dx));
  cursorY = Math.max(0, Math.min(4, cursorY + dy));
  updateGrid();
}

function pressA() {
  const ci = getCursorIndex();
  if (moveMode) {
    // Drop
    if (ci !== moveSourceSlot) {
      const temp = pokemon[ci];
      pokemon[ci] = pokemon[moveSourceSlot];
      pokemon[moveSourceSlot] = temp;
      rebuildGrid();
    }
    moveMode = false;
    moveSourceSlot = -1;
    selectedSlot = -1;
    document.getElementById('moveBtn').classList.remove('active');
  } else {
    selectedSlot = (selectedSlot === ci) ? -1 : ci;
  }
  updateGrid();
}

function pressY() {
  const ci = getCursorIndex();
  if (moveMode) {
    moveMode = false;
    moveSourceSlot = -1;
    document.getElementById('moveBtn').classList.remove('active');
  } else if (pokemon[ci]) {
    moveMode = true;
    moveSourceSlot = ci;
    selectedSlot = -1;
    document.getElementById('moveBtn').classList.add('active');
  }
  updateGrid();
}

function pressB() {
  if (moveMode) {
    moveMode = false;
    moveSourceSlot = -1;
    document.getElementById('moveBtn').classList.remove('active');
  }
  selectedSlot = -1;
  updateGrid();
  // Hide detail
  document.getElementById('pokemonDetail').classList.remove('visible');
  document.getElementById('trainerCard').classList.remove('hidden');
}

function changeBox(dir) {
  currentBox = Math.max(1, Math.min(31, currentBox + dir));
  document.getElementById('boxName').textContent = `BOX ${currentBox}`;
  document.getElementById('trainerBoxName').textContent = `BOX ${currentBox}`;
}

function rebuildGrid() {
  slots.forEach((slot, i) => {
    const p = pokemon[i];
    slot.className = `slot${p ? ' filled' : ''}`;
    if (p) {
      slot.innerHTML = `
        <div class="slot-sprite" style="font-size:36px;display:flex;align-items:center;justify-content:center;">${emojiMap[p.name]||'?'}</div>
        <div class="legality-dot ${Math.random()>0.15?'legal':'illegal'}"></div>
      `;
    } else {
      slot.innerHTML = '';
    }
  });
}

// Keyboard
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowUp': e.preventDefault(); moveDir(0,-1); break;
    case 'ArrowDown': e.preventDefault(); moveDir(0,1); break;
    case 'ArrowLeft': e.preventDefault(); moveDir(-1,0); break;
    case 'ArrowRight': e.preventDefault(); moveDir(1,0); break;
    case 'Enter': case ' ': e.preventDefault(); pressA(); break;
    case 'y': case 'Y': e.preventDefault(); pressY(); break;
    case 'Escape': case 'b': case 'B': e.preventDefault(); pressB(); break;
    case 'q': e.preventDefault(); changeBox(-1); break;
    case 'e': e.preventDefault(); changeBox(1); break;
  }
});

// Init
updateGrid();
</script>
</body>
