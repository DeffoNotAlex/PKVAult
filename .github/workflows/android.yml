name: Android

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore PKHeX.Mobile/PKHeX.Mobile.csproj

      - name: Build APK (Release)
        run: >
          dotnet build PKHeX.Mobile/PKHeX.Mobile.csproj
          -f net10.0-android
          -c Release
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT
          -p:AndroidKeyStore=false

      - name: Upload APK to Release
        run: |
          APK=$(find PKHeX.Mobile/bin/Release/net10.0-android -name "*.apk" | head -1)
          echo "Found APK: $APK"
          gh release delete nightly --yes 2>/dev/null || true
          gh release create nightly "$APK" \
            --title "Nightly Build" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
